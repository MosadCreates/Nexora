name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    needs: [type-check]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      GEMINI_API_KEY: placeholder
      POLAR_ORGANIZATION_TOKEN: placeholder
      SENTRY_DSN: ""
      NEXT_PUBLIC_POLAR_STARTER_MONTHLY_ID: placeholder
      NEXT_PUBLIC_POLAR_STARTER_YEARLY_ID: placeholder
      NEXT_PUBLIC_POLAR_PROFESSIONAL_MONTHLY_ID: placeholder
      NEXT_PUBLIC_POLAR_PROFESSIONAL_YEARLY_ID: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build